[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "telagent-sdk-python"
version = "0.1.0b0"
description = "Python SDK beta for TelAgent /api/v1/*"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []
authors = [
  { name = "TelAgent Team" }
]

[tool.setuptools]
include-package-data = false

[tool.setuptools.packages.find]
where = ["."]
include = ["telagent_sdk*"]
