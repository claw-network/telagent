<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TelAgent Web App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <main class="layout">
      <header>
        <p class="eyebrow">Product-Focused Core Flow</p>
        <h1>TelAgent Web App</h1>
        <p>
          Core conversation flow for <code>/api/v1/*</code>:
          <strong>create -> invite -> accept -> send -> pull</strong>.
        </p>
      </header>

      <section class="panel">
        <h2>Connection & Actors</h2>
        <div class="grid">
          <label>API Base URL <input id="api-base" value="http://127.0.0.1:9528" /></label>
          <label>Creator DID (A) <input id="creator-did" value="did:claw:zAlice" /></label>
          <label>Invitee DID (B) <input id="invitee-did" value="did:claw:zBob" /></label>
          <label>Group Domain <input id="group-domain" value="alpha.tel" /></label>
          <label>Target Domain <input id="target-domain" value="alpha.tel" /></label>
          <label>Mailbox Key <input id="mailbox-key" value="mailbox-main" /></label>
        </div>
        <div class="button-row">
          <button id="btn-self">GET /api/v1/identities/self</button>
          <button id="btn-randomize">Regenerate IDs/Hashes</button>
        </div>
      </section>

      <section class="panel">
        <h2>Group Setup</h2>
        <div class="grid">
          <label>Group ID (bytes32) <input id="group-id" placeholder="0x..." /></label>
          <label>Invite ID (bytes32) <input id="invite-id" placeholder="0x..." /></label>
          <label>Domain Proof Hash <input id="domain-proof-hash" placeholder="0x..." /></label>
          <label>Initial MLS Hash <input id="initial-mls-hash" placeholder="0x..." /></label>
          <label>Invite MLS Commit Hash <input id="invite-mls-hash" placeholder="0x..." /></label>
          <label>Accept MLS Welcome Hash <input id="accept-mls-hash" placeholder="0x..." /></label>
        </div>
        <div class="button-row">
          <button id="btn-create-group">1) Create Group</button>
          <button id="btn-invite">2) Invite B</button>
          <button id="btn-accept">3) Accept Invite (B)</button>
          <button id="btn-list-members">GET Members</button>
          <button id="btn-chain-state">GET Chain State</button>
        </div>
      </section>

      <section class="panel">
        <h2>Chat Composer</h2>
        <div class="grid">
          <label>Sender DID <input id="sender-did" value="did:claw:zAlice" /></label>
          <label>Conversation ID <input id="conversation-id" placeholder="group:0x..." /></label>
          <label>Conversation Type
            <select id="conversation-type">
              <option value="group" selected>group</option>
              <option value="direct">direct</option>
            </select>
          </label>
          <label>Content Type
            <select id="content-type">
              <option value="text">text</option>
              <option value="image">image</option>
              <option value="file">file</option>
              <option value="control">control</option>
            </select>
          </label>
          <label>Message (plain text) <input id="message-plain" value="Hello from TelAgent" /></label>
          <label>Ciphertext (hex override) <input id="ciphertext-hex" placeholder="0x..." /></label>
          <label>Sealed Header (hex) <input id="sealed-header" value="0x11" /></label>
          <label>Attachment Manifest Hash (image/file) <input id="attachment-manifest-hash" placeholder="0x..." /></label>
          <label>TTL (sec) <input id="ttl-sec" value="2592000" /></label>
          <label>Pull Limit <input id="pull-limit" value="20" /></label>
          <label>Pull Cursor <input id="pull-cursor" placeholder="optional" /></label>
        </div>
        <div class="button-row">
          <button id="btn-send-message">4) Send Message</button>
          <button id="btn-pull">5) Pull Messages</button>
          <button id="btn-run-flow">Run Full Happy Path</button>
        </div>
      </section>

      <div class="split">
        <section class="panel">
          <div class="panel-head">
            <h2>Activity</h2>
            <button id="btn-clear-activity" class="ghost">Clear</button>
          </div>
          <ul id="activity" class="activity"></ul>
        </section>

        <section class="panel">
          <h2>Last Response</h2>
          <pre id="output">Ready.</pre>
        </section>
      </div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
